<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
    <style>
        @import url('./assets/css/theme.css');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: var(--background);
            color: var(--color);
            font-family: Arial, sans-serif;
        }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            min-height: 500px;
            background: var(--background);
        }

        
        .header {
            padding: 14px 20px;
            background: var(--button);
            border-bottom: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .search-wrap {
            display: flex;
            gap: 8px;
            flex: 1;
        }

        .search-wrap input {
            flex: 1;
            min-width: 0;
            height: 36px;
            padding: 17px;
            border-radius: 8px;
            border: 0.5px solid var(--border);
            background: var(--input);
            color: var(--color);
            font-size: 14px;
            outline: none;
        }

        .search-wrap input:focus {
            border-color: var(--border);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
        }

        
        .tabs {
            display: flex;
            gap: 0;
            background: var(--button);
            border-bottom: 0.5px solid var(--border);
            flex-shrink: 0;
            padding: 0 20px;
        }

        .tab-btn {
            padding: 9px 16px;
            font-size: 13px;
            font-weight: 500;
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            color: var(--color);
            opacity: 0.5;
            cursor: pointer;
            transition: opacity 0.15s;
            margin-bottom: -0.5px;
        }

        .tab-btn:hover { opacity: 0.8; }
        .tab-btn.active {
            opacity: 1;
            border-bottom-color: var(--color);
        }

        
        .main {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
        }

        .tab-panel { display: none; height: 100%; }
        .tab-panel.active { display: block; }

        .empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 120px;
            color: var(--color);
            opacity: 0.4;
            gap: 8px;
        }

        .empty p { font-size: 14px; }

        
        .track-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            background: var(--pallet);
            margin-bottom: 8px;
            border-radius: 10px;
            border: 0.5px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
            position: relative;
        }

        .track-item:hover { background: var(--pallet-hover); }
        .track-item.active { background: var(--pallet2); }

        .track-art {
            width: 44px;
            height: 44px;
            border-radius: 6px;
            background: var(--pallet2);
            object-fit: cover;
            flex-shrink: 0;
            border: 0.5px solid var(--border);
        }

        .track-info { flex: 1; min-width: 0; }

        .track-title {
            font-size: 14px;
            font-weight: 500;
            color: var(--color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-artist {
            font-size: 12px;
            color: var(--color);
            opacity: 0.6;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .track-dur {
            font-size: 12px;
            color: var(--color);
            opacity: 0.4;
            flex-shrink: 0;
        }

        .explicit {
            display: inline-block;
            font-size: 10px;
            font-weight: 500;
            padding: 1px 4px;
            border-radius: 3px;
            background: var(--input);
            color: var(--color);
            border: 0.5px solid var(--border);
            margin-left: 6px;
            vertical-align: middle;
        }

        .play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 0.5px solid var(--border);
            background: var(--input);
            color: var(--color);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
        }

        .play-btn:hover { background: var(--pallet-hover); }

        
        .add-pl-btn {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 0.5px solid var(--border);
            background: var(--input);
            color: var(--color);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.15s;
            font-size: 16px;
            line-height: 1;
        }

        .track-item:hover .add-pl-btn { opacity: 1; }
        .add-pl-btn:hover { background: var(--pallet-hover); opacity: 1 !important; }

        
        .pl-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .pl-header h3 {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .btn-small {
            height: 30px;
            padding: 0 12px;
            border-radius: 7px;
            border: 0.5px solid var(--border);
            background: var(--input);
            color: var(--color);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-small:hover { background: var(--pallet-hover); }

        .pl-list { display: flex; flex-direction: column; gap: 8px; }

        .pl-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--pallet);
            border-radius: 10px;
            border: 0.5px solid var(--border);
            cursor: pointer;
            transition: background 0.15s;
        }

        .pl-item:hover { background: var(--pallet-hover); }
        .pl-item.active-pl { background: var(--pallet2); }

        .pl-icon {
            width: 36px;
            height: 36px;
            border-radius: 7px;
            background: var(--pallet2);
            border: 0.5px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .pl-info { flex: 1; min-width: 0; }

        .pl-name {
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pl-count {
            font-size: 11px;
            opacity: 0.5;
            margin-top: 2px;
        }

        .pl-delete {
            width: 26px;
            height: 26px;
            border-radius: 5px;
            border: 0.5px solid var(--border);
            background: transparent;
            color: var(--color);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .pl-item:hover .pl-delete { opacity: 0.6; }
        .pl-delete:hover { opacity: 1 !important; background: var(--input); }

        
        .pl-detail-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .pl-back-btn {
            width: 30px;
            height: 30px;
            border-radius: 7px;
            border: 0.5px solid var(--border);
            background: var(--input);
            color: var(--color);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pl-back-btn:hover { background: var(--pallet-hover); }

        .pl-detail-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .pl-track-remove {
            width: 26px;
            height: 26px;
            border-radius: 5px;
            border: 0.5px solid var(--border);
            background: transparent;
            color: var(--color);
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }

        .track-item:hover .pl-track-remove { opacity: 0.6; }
        .pl-track-remove:hover { opacity: 1 !important; background: var(--input); }

        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .modal-overlay.open {
            opacity: 1;
            pointer-events: all;
        }

        .modal {
            background: var(--button);
            border: 0.5px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .modal h3 { font-size: 15px; font-weight: 600; }

        .modal input {
            height: 36px;
            padding: 0 12px;
            border-radius: 8px;
            border: 0.5px solid var(--border);
            background: var(--input);
            color: var(--color);
            font-size: 14px;
            outline: none;
            width: 100%;
        }

        .modal input:focus {
            box-shadow: 0 0 0 3px rgba(255,255,255,0.06);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .modal-actions button {
            height: 32px;
            padding: 0 14px;
            border-radius: 7px;
            border: 0.5px solid var(--border);
            background: var(--input);
            color: var(--color);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-actions button:hover { background: var(--pallet-hover); }
        .modal-actions button.primary { background: var(--color); color: var(--background); }
        .modal-actions button.primary:hover { opacity: 0.85; }

        
        .pl-pick-list { display: flex; flex-direction: column; gap: 6px; max-height: 200px; overflow-y: auto; }

        .pl-pick-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 0.5px solid var(--border);
            background: var(--pallet);
            cursor: pointer;
            font-size: 13px;
            transition: background 0.12s;
        }

        .pl-pick-item:hover { background: var(--pallet-hover); }

        
        .section-label {
            font-size: 11px;
            font-weight: 600;
            opacity: 0.45;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 10px;
            margin-top: 4px;
        }

        
        .footer {
            flex-shrink: 0;
            background: var(--button);
            border-top: 0.5px solid var(--border);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .now-playing {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 0 0 220px;
            min-width: 0;
        }

        .now-art {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            background: var(--pallet2);
            object-fit: cover;
            flex-shrink: 0;
            border: 0.5px solid var(--border);
        }

        .now-info { min-width: 0; }

        .now-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--color);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .now-artist {
            font-size: 11px;
            color: var(--color);
            opacity: 0.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        .player-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ctrl-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: transparent;
            color: var(--color);
            opacity: 0.7;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            padding: 0;
        }

        .ctrl-btn:hover { opacity: 1; }
        .ctrl-btn img { width: 30px; height: 30px; }

        .ctrl-btn.main-btn { width: 30px; height: 30px; opacity: 1; }
        .ctrl-btn.main-btn img { width: 30px; height: 30px; }
        .ctrl-btn.main-btn:hover { opacity: 0.85; }

        .progress-wrap {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .progress-wrap span {
            font-size: 11px;
            color: var(--color);
            opacity: 0.4;
            min-width: 30px;
        }

        .progress-wrap span:last-child { text-align: right; }

        .prog-bar {
            flex: 1;
            height: 4px;
            background: var(--input);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .prog-fill {
            height: 4px;
            background: var(--color);
            border-radius: 2px;
            width: 0%;
        }

        .vol-wrap {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 0 0 130px;
            justify-content: flex-end;
        }

        .vol-wrap i { font-size: 16px; color: var(--color); opacity: 0.6; }
        .vol-wrap input[type="range"] { width: 80px; }

        .loading-bar {
            height: 2px;
            background: var(--input);
            position: relative;
            overflow: hidden;
            border-radius: 1px;
            display: none;
        }

        .loading-bar::after {
            content: '';
            position: absolute;
            left: -40%;
            width: 40%;
            height: 100%;
            background: var(--color);
            border-radius: 1px;
            animation: slide 1s linear infinite;
        }

        @keyframes slide { to { left: 100%; } }
    </style>
    <script>window.__CELESTIAL_STATIC_WISP__="wss://helping.marincareers.org/wisp/";</script>
</head>

<body theme="default">
    <div class="app">
        <div class="header">
            <div class="search-wrap">
                <input id="q" placeholder="search.." onkeydown="if(event.key==='Enter') doSearch(); else scheduleSearchClear()" oninput="onSearchInput()" />
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('search')">Search</button>
            <button class="tab-btn" onclick="switchTab('playlists')">Playlists</button>
        </div>

        <div class="loading-bar" id="loading"></div>

        <div class="main">
            
            <div class="tab-panel active" id="tab-search">
                <div id="results">
                    <div id="recent-section"></div>
                </div>
            </div>

            
            <div class="tab-panel" id="tab-playlists">
                
                <div id="pl-list-view">
                    <div class="pl-header">
                        <h3>Your Playlists</h3>
                        <button class="btn-small" onclick="openNewPlaylistModal()">+ New</button>
                    </div>
                    <div class="pl-list" id="pl-list"></div>
                    <div id="pl-empty" class="empty" style="display:none">
                        <p>No playlists yet</p>
                    </div>
                </div>
                
                <div id="pl-detail-view" style="display:none">
                    <div class="pl-detail-header">
                        <button class="pl-back-btn" onclick="showPlaylistList()">‹</button>
                        <div class="pl-detail-title" id="pl-detail-title"></div>
                    </div>
                    <div id="pl-detail-tracks"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            <div class="now-playing">
                <img class="now-art" id="now-art" src="" alt="" onerror="this.src='./assets/img/icns/music.svg';" />
                <div class="now-info">
                    <div class="now-title" id="now-title">nothing playing atm</div>
                    <div class="now-artist" id="now-artist"></div>
                </div>
            </div>

            <div class="player-center">
                <div class="player-controls">
                    <button class="ctrl-btn" onclick="skipPrev()" aria-label="Previous">
                        <img src="./assets/img/icns/skip-back.svg" />
                    </button>
                    <button class="ctrl-btn main-btn" onclick="togglePlay()" aria-label="Play/Pause">
                        <img id="play-btn-img" src="./assets/img/icns/play.svg" />
                    </button>
                    <button class="ctrl-btn" onclick="skipNext()" aria-label="Next">
                        <img src="./assets/img/icns/skip-forward.svg" />
                    </button>
                </div>
                <div class="progress-wrap">
                    <span id="cur-time">0:00</span>
                    <div class="prog-bar" id="prog-bar" onclick="seek(event)" role="slider" aria-label="Playback position">
                        <div class="prog-fill" id="prog-fill"></div>
                    </div>
                    <span id="dur-time">0:00</span>
                </div>
            </div>

            <div class="vol-wrap">
                <i class="ti ti-volume" aria-hidden="true"></i>
                <input type="range" min="0" max="100" value="80" step="1" id="vol" oninput="setVol(this.value)" aria-label="Volume" />
            </div>
        </div>
    </div>

    
    <div class="modal-overlay" id="modal-new-pl" onclick="if(event.target===this) closeNewPlaylistModal()">
        <div class="modal">
            <h3>New Playlist</h3>
            <input id="new-pl-name" placeholder="Playlist name..." maxlength="60"
                onkeydown="if(event.key==='Enter') confirmNewPlaylist()" />
            <div class="modal-actions">
                <button onclick="closeNewPlaylistModal()">Cancel</button>
                <button class="primary" onclick="confirmNewPlaylist()">Create</button>
            </div>
        </div>
    </div>

    
    <div class="modal-overlay" id="modal-add-to-pl" onclick="if(event.target===this) closeAddToPlModal()">
        <div class="modal">
            <h3>Add to Playlist</h3>
            <div class="pl-pick-list" id="pl-pick-list"></div>
            <div class="modal-actions">
                <button onclick="closeAddToPlModal()">Cancel</button>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        
        const audio = document.getElementById('audio');
        const playBtnImg = document.getElementById('play-btn-img');
        const progFill = document.getElementById('prog-fill');
        const curTime = document.getElementById('cur-time');
        const durTime = document.getElementById('dur-time');
        const loading = document.getElementById('loading');

        let tracks = [];          
        let currentIdx = -1;
        let dashPlayer = null;
        let currentSource = 'search'; 

        audio.volume = 0.8;

        function fmt(s) {
            s = Math.floor(s || 0);
            return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
        }

        function setLoading(on) { loading.style.display = on ? 'block' : 'none'; }

        function esc(s) {
            return String(s || '')
                .replace(/&/g, '&amp;').replace(/</g, '&lt;')
                .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        function destroyDash() {
            if (dashPlayer) { dashPlayer.destroy(); dashPlayer = null; }
        }

        
        function switchTab(name) {
            document.querySelectorAll('.tab-btn').forEach((b, i) => {
                b.classList.toggle('active', ['search','playlists'][i] === name);
            });
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-' + name).classList.add('active');
            if (name === 'playlists') renderPlaylistList();
        }

        
        const MAX_RECENT = 20;

        function getRecent() {
            try { return JSON.parse(localStorage.getItem('recent_tracks') || '[]'); }
            catch { return []; }
        }

        function addRecent(track) {
            let recent = getRecent().filter(t => t.id !== track.id);
            recent.unshift({ id: track.id, title: track.title, artist: track.artist,
                             album: track.album, artwork: track.artwork,
                             duration: track.duration, explicit: track.explicit, isrc: track.isrc });
            if (recent.length > MAX_RECENT) recent = recent.slice(0, MAX_RECENT);
            localStorage.setItem('recent_tracks', JSON.stringify(recent));
        }

        function renderRecent() {
            const sec = document.getElementById('recent-section');
            const recent = getRecent();
            if (!recent.length) { sec.innerHTML = ''; return; }
            sec.innerHTML = `
                <div class="section-label">Recently Played</div>
                ${recent.map((t, i) => trackHTML(t, i, 'recent')).join('')}
            `;
        }

        function showRecent() {
            const results = document.getElementById('results');
            results.innerHTML = '<div id="recent-section"></div>';
            renderRecent();
        }

        
        let searchClearTimer = null;

        function onSearchInput() {
            const q = document.getElementById('q').value.trim();
            if (!q) showRecent();
        }

        function scheduleSearchClear() {  }

        async function doSearch() {
            const q = document.getElementById('q').value.trim();
            if (!q) { showRecent(); return; }

            setLoading(true);
            try {
                const res = await fetch('./api/music/search?q=' + encodeURIComponent(q));
                const data = await res.json();
                tracks = data.items || [];
                currentSource = 'search';
                renderSearchResults();
            } catch (e) {
                document.getElementById('results').innerHTML = `
                    <div class="empty">
                        <img style="width:24px;height:24px;" src="./assets/img/icns/alert-circle.svg" />
                        <p>Search failed. Try again.</p>
                    </div>`;
            } finally {
                setLoading(false);
            }
        }

        function renderSearchResults() {
            const el = document.getElementById('results');
            if (!tracks.length) {
                el.innerHTML = `<div class="empty">
                    <img style="width:24px;height:24px;" src="./assets/img/icns/mood-empty.svg" />
                    <p>No results found</p></div>`;
                return;
            }
            el.innerHTML = `
                <div class="section-label">Results</div>
                ${tracks.map((t, i) => trackHTML(t, i, 'search')).join('')}
            `;
        }

        
        function trackHTML(t, i, context, plId) {
            const addBtn = context !== 'pl-detail'
                ? `<div class="add-pl-btn" onclick="event.stopPropagation(); openAddToPlModal(${i}, '${context}')" title="Add to playlist">+</div>`
                : `<button class="pl-track-remove" onclick="event.stopPropagation(); removeFromPlaylist('${plId}', ${i})" title="Remove">✕</button>`;
            return `
                <div class="track-item" id="track-${context}-${i}" onclick="playFromContext(${i}, '${context}', '${plId || ''}')">
                    <img class="track-art" src="${esc(t.artwork || '')}" alt="" onerror="this.style.opacity=0" />
                    <div class="track-info">
                        <div class="track-title">${esc(t.title)}${t.explicit ? '<span class="explicit">E</span>' : ''}</div>
                        <div class="track-artist">${esc(t.artist)}${t.album ? ' · ' + esc(t.album) : ''}</div>
                    </div>
                    <div class="track-dur">${fmt(t.duration)}</div>
                    ${addBtn}
                    <div class="play-btn" aria-hidden="true">
                        <img style="width:20px;height:20px;" src="./assets/img/icns/play.svg" />
                    </div>
                </div>`;
        }

        
        function playFromContext(idx, context, plId) {
            if (context === 'search') {
                currentSource = 'search';
                playTrack(idx, tracks);
            } else if (context === 'recent') {
                const recent = getRecent();
                currentSource = 'recent';
                playTrack(idx, recent);
            } else if (context === 'pl-detail') {
                currentSource = 'playlist:' + plId;
                const pl = getPlaylists().find(p => p.id === plId);
                if (pl) playTrack(idx, pl.tracks);
            }
        }

        async function playTrack(idx, trackList) {
            currentIdx = idx;
            tracks = trackList; 
            const t = trackList[idx];

            addRecent(t);
            if (document.getElementById('q').value.trim() === '') renderRecent();

            document.getElementById('now-title').textContent = t.title;
            document.getElementById('now-artist').textContent = t.artist;
            document.getElementById('now-art').src = t.artwork || '';

            setLoading(true);
            playBtnImg.src = './assets/img/icns/play.svg';

            try {
                const res = await fetch(
                    './api/music/track?id=' + t.id +
                    (t.isrc ? '&isrc=' + encodeURIComponent(t.isrc) : '')
                );
                if (!res.ok) throw new Error('Track fetch failed: ' + res.status);
                const data = await res.json();
                if (!data.url) throw new Error('No URL in response');

                destroyDash();
                audio.pause();
                audio.removeAttribute('src');
                audio.load();

                if (data.isDash) {
                    dashPlayer = dashjs.MediaPlayer().create();
                    dashPlayer.initialize(audio, data.url, true);
                    dashPlayer.setVolume(audio.volume);
                } else {
                    audio.src = data.url;
                    await audio.play();
                }

                playBtnImg.src = './assets/img/icns/pause.svg';
            } catch (e) {
                console.error('playTrack error:', e);
                playBtnImg.src = './assets/img/icns/play.svg';
                document.getElementById('now-title').textContent = 'Playback failed';
            } finally {
                setLoading(false);
            }
        }

        function togglePlay() {
            if (dashPlayer) {
                if (dashPlayer.isPaused()) { dashPlayer.play(); playBtnImg.src = './assets/img/icns/pause.svg'; }
                else { dashPlayer.pause(); playBtnImg.src = './assets/img/icns/play.svg'; }
                return;
            }
            if (!audio.src) return;
            if (audio.paused) { audio.play(); playBtnImg.src = './assets/img/icns/pause.svg'; }
            else { audio.pause(); playBtnImg.src = './assets/img/icns/play.svg'; }
        }

        function skipNext() { if (currentIdx < tracks.length - 1) playTrack(currentIdx + 1, tracks); }

        function skipPrev() {
            const ct = dashPlayer ? dashPlayer.time() : audio.currentTime;
            if (ct > 3) { if (dashPlayer) dashPlayer.seek(0); else audio.currentTime = 0; return; }
            if (currentIdx > 0) playTrack(currentIdx - 1, tracks);
        }

        function seek(e) {
            const bar = document.getElementById('prog-bar');
            const ratio = e.offsetX / bar.offsetWidth;
            if (dashPlayer) dashPlayer.seek(ratio * dashPlayer.duration());
            else if (audio.duration) audio.currentTime = ratio * audio.duration;
        }

        function setVol(v) {
            audio.volume = v / 100;
            if (dashPlayer) dashPlayer.setVolume(v / 100);
        }

        audio.addEventListener('timeupdate', () => {
            const duration = dashPlayer ? dashPlayer.duration() : audio.duration;
            const current = dashPlayer ? dashPlayer.time() : audio.currentTime;
            if (!duration) return;
            progFill.style.width = (current / duration * 100) + '%';
            curTime.textContent = fmt(current);
            durTime.textContent = fmt(duration);
        });

        audio.addEventListener('ended', skipNext);
        audio.addEventListener('pause', () => { playBtnImg.src = './assets/img/icns/play.svg'; });
        audio.addEventListener('play', () => { playBtnImg.src = './assets/img/icns/pause.svg'; });

        
        function getPlaylists() {
            try { return JSON.parse(localStorage.getItem('playlists') || '[]'); }
            catch { return []; }
        }

        function savePlaylists(pls) {
            localStorage.setItem('playlists', JSON.stringify(pls));
        }

        function createPlaylist(name) {
            const pls = getPlaylists();
            const pl = { id: 'pl_' + Date.now(), name, tracks: [] };
            pls.push(pl);
            savePlaylists(pls);
            return pl;
        }

        function deletePlaylist(id) {
            savePlaylists(getPlaylists().filter(p => p.id !== id));
            renderPlaylistList();
        }

        function addTrackToPlaylist(plId, track) {
            const pls = getPlaylists();
            const pl = pls.find(p => p.id === plId);
            if (!pl) return;
            if (pl.tracks.some(t => t.id === track.id)) return; 
            pl.tracks.push(track);
            savePlaylists(pls);
        }

        function removeFromPlaylist(plId, idx) {
            const pls = getPlaylists();
            const pl = pls.find(p => p.id === plId);
            if (!pl) return;
            pl.tracks.splice(idx, 1);
            savePlaylists(pls);
            openPlaylistDetail(plId);
        }

        
        function renderPlaylistList() {
            const pls = getPlaylists();
            const list = document.getElementById('pl-list');
            const empty = document.getElementById('pl-empty');
            if (!pls.length) { list.innerHTML = ''; empty.style.display = 'flex'; return; }
            empty.style.display = 'none';
            list.innerHTML = pls.map(pl => `
                <div class="pl-item" onclick="openPlaylistDetail('${pl.id}')">
                    <div class="pl-icon">🎵</div>
                    <div class="pl-info">
                        <div class="pl-name">${esc(pl.name)}</div>
                        <div class="pl-count">${pl.tracks.length} track${pl.tracks.length !== 1 ? 's' : ''}</div>
                    </div>
                    <button class="pl-delete" onclick="event.stopPropagation(); deletePlaylist('${pl.id}')" title="Delete">✕</button>
                </div>
            `).join('');
        }

        function openPlaylistDetail(plId) {
            const pl = getPlaylists().find(p => p.id === plId);
            if (!pl) return;
            document.getElementById('pl-list-view').style.display = 'none';
            document.getElementById('pl-detail-view').style.display = 'block';
            document.getElementById('pl-detail-title').textContent = pl.name;

            const container = document.getElementById('pl-detail-tracks');
            if (!pl.tracks.length) {
                container.innerHTML = '<div class="empty"><p>No tracks yet — add some from Search</p></div>';
                return;
            }
            container.innerHTML = pl.tracks.map((t, i) => trackHTML(t, i, 'pl-detail', plId)).join('');
        }

        function showPlaylistList() {
            document.getElementById('pl-list-view').style.display = 'block';
            document.getElementById('pl-detail-view').style.display = 'none';
            renderPlaylistList();
        }

        
        function openNewPlaylistModal() {
            document.getElementById('new-pl-name').value = '';
            document.getElementById('modal-new-pl').classList.add('open');
            setTimeout(() => document.getElementById('new-pl-name').focus(), 50);
        }

        function closeNewPlaylistModal() {
            document.getElementById('modal-new-pl').classList.remove('open');
        }

        function confirmNewPlaylist() {
            const name = document.getElementById('new-pl-name').value.trim();
            if (!name) return;
            createPlaylist(name);
            closeNewPlaylistModal();
            renderPlaylistList();
        }

        
        let pendingAddTrack = null;

        function openAddToPlModal(idx, context) {
            let trackList;
            if (context === 'search') trackList = tracks;
            else if (context === 'recent') trackList = getRecent();
            else trackList = tracks;
            pendingAddTrack = trackList[idx];

            const pls = getPlaylists();
            const list = document.getElementById('pl-pick-list');

            if (!pls.length) {
                list.innerHTML = '<div style="font-size:13px;opacity:0.5;padding:6px 0">No playlists yet. Create one first.</div>';
            } else {
                list.innerHTML = pls.map(pl => `
                    <div class="pl-pick-item" onclick="confirmAddToPl('${pl.id}')">
                        <span>🎵</span>
                        <span>${esc(pl.name)}</span>
                        <span style="margin-left:auto;opacity:0.4;font-size:11px">${pl.tracks.length} tracks</span>
                    </div>
                `).join('');
            }

            document.getElementById('modal-add-to-pl').classList.add('open');
        }

        function closeAddToPlModal() {
            document.getElementById('modal-add-to-pl').classList.remove('open');
            pendingAddTrack = null;
        }

        function confirmAddToPl(plId) {
            if (!pendingAddTrack) return;
            addTrackToPlaylist(plId, pendingAddTrack);
            closeAddToPlModal();
            
            const pl = getPlaylists().find(p => p.id === plId);
            if (pl) showToast(`Added to "${pl.name}"`);
        }

        
        function showToast(msg) {
            let t = document.getElementById('toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'toast';
                t.style.cssText = `position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
                    background:var(--color);color:var(--background);padding:7px 16px;
                    border-radius:20px;font-size:13px;font-weight:500;z-index:200;
                    opacity:0;transition:opacity 0.2s;pointer-events:none;white-space:nowrap`;
                document.body.appendChild(t);
            }
            t.textContent = msg;
            t.style.opacity = '1';
            clearTimeout(t._timer);
            t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2000);
        }

        
        showRecent();
    </script>
</body>
</html>
